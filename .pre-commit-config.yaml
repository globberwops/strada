# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
fail_fast: false
exclude: ^(\.agents/)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: \.(h|hpp|c|cc|cpp)$
      - id: shfmt
        name: shfmt
        entry: shfmt -i 2 -ci -w
        language: system
        files: \.sh$
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        files: \.sh$
      - id: cmake-format
        name: cmake-format
        entry: cmake-format -i
        language: system
        files: (CMakeLists\.txt|\.cmake)$
      - id: cmake-lint
        name: cmake-lint
        entry: cmake-lint
        language: system
        files: (CMakeLists\.txt|\.cmake)$
      - id: cppcheck
        name: cppcheck
        entry: tools/ci/run_cppcheck.sh
        language: script
        files: \.(h|hpp|c|cc|cpp)$
