name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-changes:
    name: Check Config Changes
    runs-on: ubuntu-latest
    outputs:
      devcontainer: ${{ steps.filter.outputs.devcontainer }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Detect Devcontainer Changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            devcontainer:
              - '.devcontainer/**'

  build-image:
    name: Build & Push Devcontainer
    needs: check-changes
    if: needs.check-changes.outputs.devcontainer == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Devcontainer Image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer
          imageTag: latest
          configFile: .devcontainer/devcontainer-ci.json
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

  static-checks:
    name: Formatting & Static Analysis
    needs: [check-changes, build-image]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/devcontainer:latest
      options: --user root
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run static checks
        run: ./tools/ci/run_static_checks.sh

  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    needs: [check-changes, build-image, static-checks]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/devcontainer:latest
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        preset: [default-debug, default-release, san-debug, cov-debug]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run build_and_test.sh
        run: ./tools/ci/build_and_test.sh ${{ matrix.preset }}

      - name: Generate Coverage Report (cov-debug only)
        if: matrix.preset == 'cov-debug'
        run: ./tools/ci/generate_coverage.sh
